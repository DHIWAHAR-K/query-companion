version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: queryus-postgres
    environment:
      POSTGRES_DB: queryus
      POSTGRES_USER: queryus
      POSTGRES_PASSWORD: queryus_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queryus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: queryus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Queryus backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queryus-api
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://queryus:queryus_dev_password@postgres:5432/queryus
      # Redis
      REDIS_URL: redis://redis:6379
      # Security (CHANGE IN PRODUCTION!)
      SECRET_KEY: dev-secret-key-change-in-production
      ENCRYPTION_KEY: dev-encryption-key-change-in-production
      # LLM Provider
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Google
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # Tools
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH:-true}
      ENABLE_VISION: ${ENABLE_VISION:-true}
      # App
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Mount for development hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
